server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: iot-rule-engine

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/iot_rule_engine?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: IotRuleEngineHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml,classpath*:com/iot/ruleengine/**/mapper/**/*.xml
  type-aliases-package: com.iot.ruleengine.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      banner: false

mqtt:
  host-url: tcp://localhost:1883
  client-id: iot-rule-engine-${random.value}
  username: admin
  password: public
  default-topic: iot/device/telemetry
  timeout: 30
  keep-alive: 60
  async: true

drools:
  rules-path: classpath*:rules/**/*.drl

logging:
  level:
    root: info
    com.iot.ruleengine: debug
    org.drools: debug
    org.eclipse.paho: info
    org.springframework.integration.mqtt: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
