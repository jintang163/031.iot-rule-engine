server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: iot-rule-engine

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/iot_rule_engine?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: IotRuleEngineHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 3
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432
    consumer:
      group-id: iot-rule-engine-group
      auto-offset-reset: latest

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml,classpath*:com/iot/ruleengine/**/mapper/**/*.xml
  type-aliases-package: com.iot.ruleengine.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      banner: false

mqtt:
  host-url: tcp://localhost:1883
  client-id: iot-rule-engine-${random.value}
  username: admin
  password: public
  default-topic: iot/device/telemetry
  timeout: 30
  keep-alive: 60
  async: true

drools:
  rules-path: classpath*:rules/**/*.drl

logging:
  level:
    root: info
    com.iot.ruleengine: debug
    org.drools: debug
    org.eclipse.paho: info
    org.springframework.integration.mqtt: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

# ===================== 规则引擎核心配置 =====================
rule:
  # 规则引擎类型：aviator(表达式引擎，推荐) / drools(Drools规则引擎) / hybrid(混合模式)
  engine: aviator

  # -------- Flink模式配置 --------
  flink:
    # 是否启用Flink分布式模式，false=直接模式在Spring进程内同步执行，true=Flink独立作业
    enabled: false
    # Kafka集群地址
    kafka-bootstrap: localhost:9092
    # 源topic：设备遥测数据输入
    source-topic: iot-device-telemetry
    # 下沉topic：设备控制命令输出（备用，实际走MQTT）
    sink-topic: iot-device-command
    # 规则同步接口：从rule-engine服务拉取已启用规则列表
    rule-sync-url: http://localhost:8080/api/rule/internal/enabled-list

  # -------- 规则编译缓存配置(Caffeine) --------
  cache:
    # Aviator表达式编译结果缓存最大条目数
    compile-max-size: 10000
    # 规则JSON解析结果缓存最大条目数
    parse-max-size: 5000
    # 缓存过期时间（小时）
    expire-hours: 24

  # -------- 指标监控配置 --------
  metrics:
    # 是否开启规则引擎指标采集
    enabled: true
    # 是否导出评估延迟直方图（用于Prometheus）
    export-latency-histogram: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
    metrics:
      export:
        prometheus:
          enabled: true
